<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="ion-text-capitalize"> {{organisation.name}} </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="signOut()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large" class="ion-text-capitalize">
        {{organisation.name}}
      </ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-grid>
    <ion-row>
      <ion-col size="auto">
        <ion-list-header>
          <ion-label>Theme Colors</ion-label>
        </ion-list-header>

        <ion-card class="my-3" *ngFor="let color of colors">
          <ion-item lines="none" [color]="color.name">
            <ngx-colors
              slot="start"
              ngx-colors-trigger
              [(ngModel)]="color.value"
            ></ngx-colors>
            <ion-label>
              <h2>{{color.name}}</h2>
            </ion-label>
          </ion-item>
        </ion-card>
      </ion-col>
      <ion-col size="auto">
        <ion-list lines="none">
          <ion-list-header>
            <ion-label>More Settings</ion-label>
          </ion-list-header>
          <ion-item-group>
            <ion-item>
              <ion-label position="stacked">Currency Symbol</ion-label>
              <ion-input
                placeholder="Enter text"
                [(ngModel)]="organisation.code"
              ></ion-input>
              <ion-buttons slot="end" class="self-end">
                <ion-button (click)="saveSymbol(organisation.code)">
                  <ion-icon name="save" slot="icon-only"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">Token issuer</ion-label>
              <ion-input
                placeholder="Enter issue"
                [(ngModel)]="organisation.issuer"
              ></ion-input>
              <ion-buttons slot="end" class="self-end">
                <ion-button (click)="saveIssuer(organisation.issuer)">
                  <ion-icon name="save" slot="icon-only"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">Ledger</ion-label>
              <ion-input
                placeholder="Enter text"
                [(ngModel)]="organisation.ledger"
              ></ion-input>
              <ion-buttons slot="end" class="self-end">
                <ion-button (click)="saveLedger(organisation.ledger)">
                  <ion-icon name="save" slot="icon-only"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
          </ion-item-group>
        </ion-list>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
